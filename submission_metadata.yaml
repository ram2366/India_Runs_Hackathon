ai_usage_summary: |
  Used AI assistance for architecture discussion, code generation, documentation,
  and review. No hosted LLM/API calls are used during the ranking step.

methodology_summary: |
  V2 uses a reproducible two-stage candidate ranking system. V1 is a CPU-only
  feature engine that scores title fit, experience band, production ML evidence,
  search/retrieval/ranking/recommendation evidence, evaluation maturity,
  product-company fit, Redrob availability signals, and fake-profile risk.
  Manual labels on a curated candidate pack are then used to train a small
  offline pairwise linear reranker optimized for candidate ordering. Final
  output is audited for top-rank quality, honeypot risk, reasoning factuality,
  and official CSV validity. No network, GPU, or hosted LLM is used in ranking.

